# fly.toml app configuration file generated for iforgot on 2024-11-24T17:30:13+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iforgot'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile.fly'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
